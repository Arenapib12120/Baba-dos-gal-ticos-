<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>⚽ Arena PIB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--gold:#f1c40f;
--blue:#00bfff;
--dark:#0d1117;
--card:#161b22;
--green:#2ecc71;
--red:#e74c3c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Montserrat,sans-serif;
background:linear-gradient(180deg,#0d1117,#05080d);
color:white;
min-height:100vh;
}

header{
padding:25px;
text-align:center;
font-size:34px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,var(--gold),#ffdd33);
color:#000;
box-shadow:0 4px 20px rgba(0,0,0,.3);
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:var(--card);
padding:22px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.25);
}

h2{
margin-bottom:15px;
font-size:22px;
color:var(--gold);
}

input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
}

input,select{
background:#222;
color:white;
}

button{
background:linear-gradient(90deg,var(--blue),#005eff);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.02);
}

.player{
background:#222;
padding:14px;
border-radius:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tag{
padding:4px 8px;
border-radius:8px;
font-size:12px;
font-weight:700;
}

.gk{background:#ff7f50;}
.df{background:#00bfff;}
.mc{background:#9b59b6;}
.at{background:#2ecc71;}

.team{
padding:15px;
margin-top:15px;
border-radius:14px;
background:#111827;
border:1px solid #2b3442;
}

.count{
font-size:32px;
font-weight:800;
color:var(--green);
text-align:center;
}

.small{
font-size:13px;
color:#999;
margin-top:6px;
}

</style>
</head>

<body>

<header>⚽ ARENA PIB PRO</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>⏳ Próximo Baba</h2>
<div class="count" id="countdown">...</div>
<div class="small">Toda segunda às 20h</div>
</div>

<div class="card">
<h2>➕ Novo Jogador</h2>

<input id="nome" placeholder="Nome do jogador">

<select id="posicao">
<option>Goleiro</option>
<option>Zagueiro</option>
<option>Meio</option>
<option>Atacante</option>
</select>

<select id="nota">
<option value="1">⭐ 1</option>
<option value="2">⭐⭐ 2</option>
<option value="3">⭐⭐⭐ 3</option>
<option value="4">⭐⭐⭐⭐ 4</option>
<option value="5">⭐⭐⭐⭐⭐ 5</option>
</select>

<button onclick="addPlayer()">Salvar Jogador</button>
</div>

<div class="card">
<h2>📋 Jogadores</h2>
<div id="lista"></div>
</div>

<div class="card">
<h2>⚽ Sorteio Inteligente</h2>

<select id="times">
<option value="2">2 Times</option>
<option value="3">3 Times</option>
<option value="4">4 Times</option>
</select>

<button onclick="sortear()">Gerar Times</button>

<div id="resultado"></div>
</div>

</div>

</div>

<script>

let jogadores = JSON.parse(localStorage.getItem("arena")) || [];

// CONTAGEM
function contador(){

let now = new Date();
let alvo = new Date();

let dia = now.getDay();
let faltam = (1 - dia + 7) % 7;

alvo.setDate(now.getDate()+faltam);
alvo.setHours(20,0,0,0);

if(now > alvo) alvo.setDate(alvo.getDate()+7);

let diff = alvo-now;

let d = Math.floor(diff/86400000);
let h = Math.floor(diff%86400000/3600000);
let m = Math.floor(diff%3600000/60000);
let s = Math.floor(diff%60000/1000);

document.getElementById("countdown").innerHTML =
`${d}d ${h}h ${m}m ${s}s`;

}

setInterval(contador,1000);
contador();


// SALVAR
function salvar(){
localStorage.setItem("arena",JSON.stringify(jogadores));
render();
}

// ADD
function addPlayer(){

let nome = document.getElementById("nome").value;
let pos = document.getElementById("posicao").value;
let nota = Number(document.getElementById("nota").value);

if(nome=="") return alert("Digite nome");

jogadores.push({
nome:nome,
pos:pos,
nota:nota
});

document.getElementById("nome").value="";
salvar();
}

// RENDER
function render(){

let html="";

jogadores.forEach((j,i)=>{

let cls="mc";

if(j.pos=="Goleiro") cls="gk";
if(j.pos=="Zagueiro") cls="df";
if(j.pos=="Atacante") cls="at";

html+=`
<div class="player">
<div>
<strong>${j.nome}</strong><br>
<span class="tag ${cls}">${j.pos}</span>
</div>
<div>⭐${j.nota}</div>
</div>
`;

});

document.getElementById("lista").innerHTML=html;
}

render();


// SORTEIO EQUILIBRADO
function sortear(){

let qtd = Number(document.getElementById("times").value);

let lista = [...jogadores].sort((a,b)=>b.nota-a.nota);

let times = [];

for(let i=0;i<qtd;i++){
times.push({
nome:"Time "+String.fromCharCode(65+i),
jogadores:[],
total:0
});
}

lista.forEach(p=>{

times.sort((a,b)=>a.total-b.total);

times[0].jogadores.push(p);
times[0].total += p.nota;

});

let html="";

times.forEach(t=>{

html+=`
<div class="team">
<h3>${t.nome} (${t.total}⭐)</h3>
`;

t.jogadores.forEach(j=>{
html+=`${j.nome} - ${j.pos} ⭐${j.nota}<br>`;
});

html+=`</div>`;

});

document.getElementById("resultado").innerHTML=html;

}

</script>

</body>
</html>
