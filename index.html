<script type="module">
// ── FIREBASE CONFIGURATION ────────────────────────────────────────────────────
import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

// Inicialização do Firebase já está no escopo global via script tag anterior
const db = window.db.database;
const playersRefDB = window.db.playersRefDB;

// ── POSIÇÕES DE FUTSAL ────────────────────────────────────────────────────────
const POSITIONS = ["Goleiro","Fixo","Ala","Pivô"];
const POS_COLORS = {
  "Goleiro": {bg:"#FF6B35", glow:"#FF6B3530"},
  "Fixo":    {bg:"#00C2FF", glow:"#00C2FF30"},
  "Ala":     {bg:"#9B59B6", glow:"#9B59B630"},
  "Pivô":    {bg:"#2ECC71", glow:"#2ECC7130"}
};

const QUALITY_LABELS = {1:"Fraco",2:"Regular",3:"Bom",4:"Ótimo",5:"Elite"};
const TEAM_THEMES = [
  {name:"Galácticos A",color:"#FF4444",emoji:"⭐"},
  {name:"Galácticos B",color:"#4488FF",emoji:"⭐"},
  {name:"Galácticos C",color:"#44CC44",emoji:"⭐"},
  {name:"Galácticos D",color:"#FFB800",emoji:"⭐"}
];

// Times de 5 jogadores no futsal
const PLAYERS_PER_TEAM = 5;

let state = {tab:"jogadores",players:[],loading:true,modal:null,filterPos:"Todos",numTeams:2,selected:new Set(),drawn:null,drawing:false};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function snakeDraft(sorted, teams) {
  let idx=0, round=0;
  const n=teams.length;
  while(idx<sorted.length){
    const dir=round%2===0?1:-1;
    const start=round%2===0?0:n-1;
    for(let step=0;step<n&&idx<sorted.length;step++){
      const t=teams[start+step*dir];
      t.players.push(sorted[idx]);
      t.total+=sorted[idx].quality||0;
      idx++;
    }
    round++;
  }
}

function balancedDraw(players, n) {
  const teams=TEAM_THEMES.slice(0,n).map(t=>({...t,players:[],total:0}));
  const byPos={};
  POSITIONS.forEach(pos=>{byPos[pos]=[];});
  players.forEach(p=>{(byPos[p.position]||(byPos["Outros"]=byPos["Outros"]||[])).push(p);});

  function sortByQuality(arr){
    const g={};
    arr.forEach(p=>{if(!g[p.quality])g[p.quality]=[];g[p.quality].push(p);});
    Object.keys(g).forEach(q=>{g[q]=shuffle(g[q]);});
    return [5,4,3,2,1].flatMap(q=>g[q]||[]);
  }

  snakeDraft(sortByQuality(byPos["Goleiro"]||[]), teams);
  snakeDraft(sortByQuality(byPos["Fixo"]||[]), teams);
  snakeDraft(sortByQuality([...(byPos["Ala"]||[]), ...(byPos["Pivô"]||[]), ...(byPos["Outros"]||[])]), teams);

  return teams;
}

function posColor(pos){return POS_COLORS[pos]||{bg:"#888",glow:"#88888830"};}
function stars(val){return[1,2,3,4,5].map(s=>`<span style="font-size:16px;color:${s<=(val||0)?'#FFD700':'#2a2a3a'};text-shadow:${s<=(val||0)?'0 0 8px #FFD70099':'none'}">★</span>`).join('');}

function playerCardHTML(p,selectable=false){
  const c=posColor(p.position);const sel=selectable&&state.selected.has(p.id);
  const pending=!p.quality||p.quality===0;
  const starsHTML=pending
    ?`<div style="margin-top:4px"><span class="pending-badge">⏳ SEM NOTA</span></div>`
    :`<div style="display:flex;align-items:center;gap:6px;margin-top:3px">${stars(p.quality)}<span class="quality-label">${QUALITY_LABELS[p.quality]}</span></div>`;
  return `<div class="player-card ${sel?'selected':''}" style="--col:${c.bg};--glow:${c.glow};--border:${sel?c.bg:pending?'#FFD70040':c.bg+'35'};cursor:${selectable?'pointer':'default'}" data-action="${selectable?'toggle':''}" data-id="${p.id}">
    ${selectable?`<div class="check-circle ${sel?'on':''}" style="--col:${c.bg}">${sel?'✓':''}</div>`:''}
    <div class="player-avatar" style="--col:${c.bg};--glow:${c.glow}">${p.name.charAt(0)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span class="player-name">${p.name}</span>
        <span class="pos-badge" style="background:${c.bg}">${p.position}</span>
      </div>
      ${starsHTML}
    </div>
    ${!selectable?`<div style="display:flex;gap:5px;flex-shrink:0">
      ${pending?`<button style="background:#FFD70020;border:1px solid #FFD70040;border-radius:7px;color:#FFD700;cursor:pointer;font-size:11px;padding:5px 9px;font-weight:700;white-space:nowrap;-webkit-appearance:none" data-action="edit" data-id="${p.id}">⭐ AVALIAR</button>`:''}
      <button class="edit-btn" data-action="edit" data-id="${p.id}">✏️</button>
      <button class="del-btn" data-action="delete" data-id="${p.id}">🗑</button>
    </div>`:''}
  </div>`;
}

function modalHTML(){
  const p=state.modal;const pos=p?.position||"Goleiro";const c=posColor(pos);
  const posEmojis={"Goleiro":"🧤","Fixo":"🛡️","Ala":"⚡","Pivô":"🎯"};
  return `<div class="overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">${p?.id?'✏️ Editar':'➕ Novo'} Jogador</div>
      <div class="field"><label>Nome</label><input id="f-name" value="${p?.name||''}" placeholder="Ex: Falcão" style="border-color:#ffffff18" onfocus="this.style.borderColor='${c.bg}88'" onblur="this.style.borderColor='#ffffff18'"/></div>

function getModalFields(){return{name:(document.getElementById("f-name")?.value||"").trim(),club:(document.getElementById("f-club")?.value||"").trim(),position:state.modal?.position||"Goleiro",quality:state.modal?.quality||0};}

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const action=el.dataset.action,id=el.dataset.id;
  if(action==="tab"){state.tab=el.dataset.tab;state.drawn=null;render();}
  else if(action==="filter"){state.filterPos=el.dataset.pos;render();}
  else if(action==="openmodal"){state.modal={position:"Goleiro",quality:0};render();}
  else if(action==="closemodal"){state.modal=null;render();}
  else if(action==="edit"){state.modal={...state.players.find(p=>p.id===id)};render();}
  else if(action==="delete"){if(confirm("Remover jogador?")){remove(ref(db,`jogadores/${id}`));state.selected.delete(id);render();}}
  else if(action==="toggle"){if(state.selected.has(id))state.selected.delete(id);else state.selected.add(id);render();}
  else if(action==="setpos"){state.modal={...state.modal,...getModalFields(),position:el.dataset.pos};render();}
  else if(action==="setquality"){state.modal={...state.modal,...getModalFields(),quality:parseInt(el.dataset.q)};render();}
  else if(action==="savemodal"){
    const d=getModalFields();if(!d.name)return;
    if(state.modal?.id){update(ref(db,`jogadores/${state.modal.id}`), d);}
    else{push(ref(db,'jogadores'), d);}
    state.modal=null;render();
  }
  else if(action==="numteams"){state.numTeams=parseInt(el.dataset.n);state.drawn=null;render();}
  else if(action==="draw"){
    const pool=state.players.filter(p=>p.presente===true&&p.quality>0);
    if(pool.length<state.numTeams*2)return;
    state.drawing=true;render();
    setTimeout(()=>{state.drawn=balancedDraw(pool,state.numTeams);state.drawing=false;render();},900);
  }
  else if(action==="marcar-presente"){
    update(ref(db,`jogadores/${id}`), {presente:true,confirmedAt:Date.now()});
    render();
  }
  else if(action==="cancelar-presenca"){
    if(confirm("Retirar presença deste jogador?"))
      update(ref(db,`jogadores/${id}`), {presente:false,confirmedAt:null});
    render();
  }
  else if(action==="share"){
    // CORRIGIDO: Gera o link correto da página atual
    const url = window.location.href.split('?')[0].split('#')[0];
    if(navigator.share){
      navigator.share({title:"Baba dos Galáticos ⭐",text:"Venha jogar no baba de futsal! Confirme sua presença.",url:url});
    } else {
      navigator.clipboard.writeText(url).then(()=>alert("Link copiado!\n" + url)).catch(()=>alert(url));
    }
  }
  if(el.id==="modal-overlay"){state.modal=null;render();}
});

document.getElementById("login-player-btn").addEventListener("click",async()=>{
  const name=document.getElementById("login-name").value.trim();
  if(!name||!selectedLoginPos){alert("Preencha seu nome e posição!");return;}
  const btn=document.getElementById("login-player-btn");
  btn.textContent="VERIFICANDO...";btn.disabled=true;
  
  // Busca no Firebase se o nome existe
  const snapshot = await new Promise((resolve) => {
    onValue(playersRefDB, resolve, { onlyOnce: true });
  });
  const data = snapshot.val() || {};
  const existing = Object.entries(data).find(([id,p]) => p.name && p.name.toLowerCase() === name.toLowerCase());
  
  if(!existing){

    btn.textContent="CONFIRMAR PRESENÇA";btn.disabled=false;
    return;
  }
  document.getElementById("login-error").style.display="none";
  update(ref(db,`jogadores/${existing[0]}`), {position:selectedLoginPos, presente:true, confirmedAt:Date.now()});
  showSuccess(existing[1].name);
});

document.getElementById("login-adm-btn").addEventListener("click",()=>{
  const pw=document.getElementById("adm-password").value;
  if(pw===ADM_PASSWORD){ localStorage.setItem("adm","1"); showApp(); state.loading=false; }
  else { document.getElementById("adm-error").style.display="block"; }
});

// Carrega dados do Firebase em tempo real
onValue(playersRefDB, (snapshot) => {
  const data = snapshot.val() || {};
  state.players = Object.entries(data).map(([id,p]) => ({id,...p})).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  state.players.forEach(p => state.selected.add(p.id));
  state.loading = false;
  render();
});

const isAdm = localStorage.getItem("adm") === "1";
if(isAdm){ showApp(); } else { showLogin(); }
