<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Arena PIB PRO</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(90deg,#f1c40f,#ffd700);
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#000;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

h2{
margin-bottom:15px;
color:#f1c40f;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

input,select{
background:#1f2937;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.player{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:8px;
display:flex;
justify-content:space-between;
}

.team{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-top:10px;
}

#countdown{
font-size:28px;
font-weight:bold;
color:#2ecc71;
text-align:center;
}

img{
max-width:100%;
}
</style>
</head>

<body>

<header>⚽ ARENA PIB PRO</header>

<div class="container">

<div class="card">
<h2>⏳ Próximo Baba</h2>
<div id="countdown"></div>
</div>

<div class="card">
<h2>➕ Adicionar Jogador</h2>

<input type="text" id="nome" placeholder="Nome do jogador">

<select id="posicao">
<option>Goleiro</option>
<option>Zagueiro</option>
<option>Meio</option>
<option>Atacante</option>
</select>

<select id="nota">
<option value="1">⭐ 1</option>
<option value="2">⭐⭐ 2</option>
<option value="3">⭐⭐⭐ 3</option>
<option value="4">⭐⭐⭐⭐ 4</option>
<option value="5">⭐⭐⭐⭐⭐ 5</option>
</select>

<button onclick="addPlayer()">Salvar Jogador</button>
</div>

<div class="card">
<h2>📋 Jogadores</h2>
<div id="lista"></div>
</div>

<div class="card">
<h2>⚽ Sorteio de Times</h2>

<select id="times">
<option value="2">2 Times</option>
<option value="3">3 Times</option>
<option value="4">4 Times</option>
</select>

<button onclick="sortear()">Sortear</button>

<div id="resultado"></div>
</div>

<div class="card">
<h2>🏆 Campeão da Semana</h2>

<input type="text" id="nomeCampeao" placeholder="Nome do campeão">

<input type="file" id="fotoCampeao" accept="image/*">

<button onclick="salvarCampeao()">Salvar Campeão</button>

<div id="campeaoBox"></div>
</div>

</div>

<script>

// ================== CONTAGEM ==================
function contador(){

let now = new Date();
let alvo = new Date();

let dia = now.getDay();
let faltam = (1 - dia + 7) % 7;

alvo.setDate(now.getDate()+faltam);
alvo.setHours(20,0,0,0);

if(now > alvo){
alvo.setDate(alvo.getDate()+7);
}

let diff = alvo-now;

let d = Math.floor(diff/86400000);
let h = Math.floor(diff%86400000/3600000);
let m = Math.floor(diff%3600000/60000);
let s = Math.floor(diff%60000/1000);

document.getElementById("countdown").innerHTML =
`${d}d ${h}h ${m}m ${s}s`;

}

setInterval(contador,1000);
contador();


// ================== JOGADORES ==================
let jogadores = JSON.parse(localStorage.getItem("arena")) || [];

function salvar(){
localStorage.setItem("arena",JSON.stringify(jogadores));
render();
}

function addPlayer(){

let nome = document.getElementById("nome").value;
let pos = document.getElementById("posicao").value;
let nota = Number(document.getElementById("nota").value);

if(nome==""){
alert("Digite nome");
return;
}

jogadores.push({
nome:nome,
pos:pos,
nota:nota
});

document.getElementById("nome").value="";

salvar();
}

function render(){

let html="";

jogadores.forEach((j)=>{

html += `
<div class="player">
<span>${j.nome} - ${j.pos}</span>
<span>⭐${j.nota}</span>
</div>
`;

});

document.getElementById("lista").innerHTML = html;
}

render();


// ================== SORTEIO ==================
function sortear(){

let qtd = Number(document.getElementById("times").value);

let lista = [...jogadores].sort((a,b)=>b.nota-a.nota);

let times = [];

for(let i=0;i<qtd;i++){
times.push({
nome:"Time "+String.fromCharCode(65+i),
jogadores:[],
total:0
});
}

lista.forEach(p=>{

times.sort((a,b)=>a.total-b.total);

times[0].jogadores.push(p);
times[0].total += p.nota;

});

let html="";

times.forEach(t=>{

html += `
<div class="team">
<h3>${t.nome} (${t.total}⭐)</h3>
`;

t.jogadores.forEach(j=>{
html += `${j.nome} - ${j.pos} ⭐${j.nota}<br>`;
});

html += `</div>`;

});

document.getElementById("resultado").innerHTML = html;
}


// ================== CAMPEÃO ==================
window.onload = function(){
mostrarCampeao();
}

function salvarCampeao(){

let nome = document.getElementById("nomeCampeao").value;
let file = document.getElementById("fotoCampeao").files[0];

if(!nome || !file){
alert("Digite nome e escolha foto");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let campeao = {
nome:nome,
foto:e.target.result
};

localStorage.setItem("campeaoArena", JSON.stringify(campeao));

mostrarCampeao();

}

reader.readAsDataURL(file);

}

function mostrarCampeao(){

let data = JSON.parse(localStorage.getItem("campeaoArena"));

if(!data) return;

document.getElementById("campeaoBox").innerHTML = `
<div style="margin-top:20px;background:#1f2937;padding:20px;border-radius:15px;text-align:center;">

<img src="${data.foto}" style="
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
border:4px solid gold;
box-shadow:0 0 20px gold;
">

<h2 style="margin-top:15px;color:gold;">
🏆 ${data.nome}
</h2>

<p>Campeão Atual</p>

</div>
`;

}

</script>

</body>
</html>
