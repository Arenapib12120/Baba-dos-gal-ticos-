<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Baba dos Galácticos ⚽</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@600;800;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --gold:#D4AF37;
      --gold-bright:#F4D160;
      --gold-deep:#9A7B1A;
      --black:#0a0a0a;
      --black-2:#141414;
      --black-3:#1c1c1c;
      --hairline:#D4AF3722;
      --text-dim:#8a8170;
    }
    body{
      background:
        radial-gradient(ellipse 900px 500px at 50% -10%, #2a220b 0%, transparent 60%),
        linear-gradient(180deg,#0a0a0a,#050505 60%);
      color:#f2ead8;font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px;
      background-attachment:fixed;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes crownPulse{0%,100%{filter:drop-shadow(0 0 2px #D4AF3700)}50%{filter:drop-shadow(0 0 8px #D4AF37aa)}}
    .fu{animation:fadeUp 0.35s ease forwards}
    .header{padding:22px 16px 0;background:linear-gradient(180deg,#0a0a0a 75%,transparent);position:sticky;top:0;backdrop-filter:blur(16px);z-index:100;border-bottom:1px solid var(--hairline)}
    .header-inner{max-width:640px;margin:0 auto}
    .crest{display:flex;align-items:center;gap:9px}
    .crest-emblem{font-size:22px;animation:crownPulse 3.5s ease-in-out infinite}
    .logo{font-family:'Cinzel',serif;font-weight:900;font-size:21px;letter-spacing:2px;
      background:linear-gradient(100deg,#9A7B1A 0%,#F4D160 35%,#fff7e0 50%,#F4D160 65%,#9A7B1A 100%);
      background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:shimmer 5s linear infinite;}
    .subtag{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-weight:700}
    .tabs{display:flex;gap:3px;margin-top:14px}
    .tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;color:#5c5648;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;border-radius:8px 8px 0 0;border-bottom:2px solid transparent;-webkit-appearance:none;transition:all 0.2s}
    .tab-btn.active{background:linear-gradient(180deg,#D4AF3712,transparent);color:var(--gold-bright);border-bottom:2px solid var(--gold)}
    .content{max-width:640px;margin:0 auto;padding:16px 14px 60px}
    .btn-add{background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));border:none;border-radius:10px;color:#1a1404;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;padding:8px 13px;cursor:pointer;-webkit-appearance:none;font-weight:700;box-shadow:0 2px 14px #D4AF3733}
    .btn-ghost{background:#D4AF3712;border:1px solid var(--hairline);border-radius:9px;color:#cbb87c;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:7px 10px;cursor:pointer;-webkit-appearance:none}
    .player-card{background:linear-gradient(135deg,var(--black-2),var(--black-3));border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:8px;position:relative;overflow:hidden}
    .player-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--col)}
    .player-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--col),var(--col)88);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0a0a;flex-shrink:0;font-family:'Bebas Neue',sans-serif;border:1.5px solid #00000030}
    .pos-badge{color:#0a0a0a;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;text-transform:uppercase}
    .pending-badge{font-size:9px;background:#D4AF3722;color:var(--gold-bright);border-radius:4px;padding:2px 7px;font-weight:700}
    .presente-badge{font-size:9px;background:#2ECC7120;color:#2ECC71;border-radius:4px;padding:2px 7px;font-weight:700}
    .convidado-badge{font-size:9px;background:#9A7B1A30;color:#cbb87c;border-radius:4px;padding:2px 7px;font-weight:700}
    .attr-bar{height:4px;border-radius:2px;margin-top:2px}
    .overlay{position:fixed;inset:0;background:#000d;backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;z-index:300;padding:16px;overflow-y:auto}
    .modal{background:linear-gradient(145deg,var(--black-2),#0e0e0e);border:1px solid var(--hairline);border-radius:20px;padding:24px 20px;width:100%;max-width:420px;margin:auto;box-shadow:0 0 60px #D4AF3711}
    .modal-title{font-family:'Cinzel',serif;font-weight:800;font-size:20px;letter-spacing:1px;color:var(--gold-bright);margin-bottom:18px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
    .field input,.field textarea{width:100%;background:#ffffff08;border:1px solid var(--hairline);border-radius:10px;padding:10px 13px;color:#f2ead8;font-size:14px;outline:none;-webkit-appearance:none;font-family:inherit}
    .field textarea{resize:vertical;min-height:140px;line-height:1.5}
    .pos-btns{display:flex;gap:6px;flex-wrap:wrap}
    .pos-btn{padding:6px 11px;border-radius:7px;font-weight:700;font-size:11px;cursor:pointer;-webkit-appearance:none}
    .attr-slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:#ffffff10;outline:none;cursor:pointer}
    .attr-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #0a0a0a}
    .modal-actions{display:flex;gap:8px;margin-top:20px}
    .cancel-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--hairline);background:#ffffff06;color:#766f5c;font-weight:700;font-size:13px;cursor:pointer;-webkit-appearance:none}
    .save-btn{flex:2;padding:11px;border-radius:10px;border:none;color:#0a0a0a;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;cursor:pointer;-webkit-appearance:none;font-weight:700}
    .draw-btn{width:100%;padding:15px;border-radius:12px;border:none;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none}
    .draw-btn.ready{background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));color:#0a0a0a;box-shadow:0 4px 24px #D4AF3744;font-weight:700}
    .draw-btn.disabled{background:#ffffff08;color:#444;cursor:not-allowed}
    .spinner{width:18px;height:18px;border:3px solid #0a0a0a44;border-top-color:#0a0a0a;border-radius:50%;animation:spin 0.8s linear infinite}
    .team-card{border-radius:14px;overflow:hidden;margin-bottom:12px;border:2px solid var(--tc)}
    .reshuffle-btn{width:100%;padding:11px;border-radius:10px;border:1px solid var(--hairline);background:#ffffff06;color:#a99a6e;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none}
    .empty{text-align:center;padding:50px 20px;color:#4a4536}
    .section-label{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .radar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .radar-label{font-size:10px;color:#8a8170;width:70px;flex-shrink:0}
    .radar-track{flex:1;height:5px;background:#ffffff0a;border-radius:3px;overflow:hidden}
    .radar-fill{height:100%;border-radius:3px;transition:width 0.5s}
    .import-box{background:linear-gradient(135deg,var(--black-2),var(--black-3));border:1.5px solid var(--hairline);border-radius:14px;padding:16px;margin-bottom:16px}
    .import-preview-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:#ffffff05;margin-bottom:5px;font-size:13px}
    .gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold)55,transparent);margin:14px 0}

    /* ---- Draw lottery animation ---- */
    .lottery-wrap{background:radial-gradient(ellipse at 50% 30%,#1c1708,#0a0a0a 70%);border:1.5px solid var(--hairline);border-radius:18px;padding:28px 16px 22px;margin-bottom:18px;overflow:hidden;position:relative;min-height:280px}
    .lottery-title{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--gold-bright);margin-bottom:18px;opacity:0.9}
    @keyframes ballBounce{
      0%{transform:translateY(0) translateX(0) rotate(0deg)}
      25%{transform:translateY(-18px) translateX(8px) rotate(90deg)}
      50%{transform:translateY(4px) translateX(-10px) rotate(180deg)}
      75%{transform:translateY(-12px) translateX(6px) rotate(270deg)}
      100%{transform:translateY(0) translateX(0) rotate(360deg)}
    }
    @keyframes drumGlow{
      0%,100%{box-shadow:inset 0 0 30px #D4AF3722,0 0 0px #D4AF3700}
      50%{box-shadow:inset 0 0 50px #D4AF3744,0 0 30px #D4AF3733}
    }
    .lottery-drum{position:relative;width:100%;height:170px;border-radius:50%/40%;background:linear-gradient(180deg,#000 0%,#141108 100%);border:2px solid var(--hairline);animation:drumGlow 1.6s ease-in-out infinite;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;padding:14px}
    .lottery-ball{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-weight:700;font-size:12px;color:#0a0a0a;flex-shrink:0;border:1px solid #00000040;box-shadow:0 2px 6px #00000066,inset 0 -3px 4px #00000022,inset 0 2px 3px #ffffff55;animation:ballBounce 0.55s ease-in-out infinite}
    .lottery-status{text-align:center;margin-top:16px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:#cbb87c;min-height:20px}
    .lottery-status .name-pop{display:inline-block;animation:fadeUp 0.25s ease}
    @keyframes revealPop{
      0%{opacity:0;transform:scale(0.85) translateY(10px)}
      60%{opacity:1;transform:scale(1.03) translateY(-2px)}
      100%{opacity:1;transform:scale(1) translateY(0)}
    }
    .team-card.revealing{animation:revealPop 0.4s ease forwards}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const POSITIONS=["Goleiro","Defesa","Meio-campo","Atacante"];
// Galácticos palette: gold/black premium, positions distinguished by warm metal tones instead of generic rainbow
const POS_COLORS={
  "Goleiro":{bg:"#F4D160",glow:"#F4D16030"},
  "Defesa":{bg:"#C0C0C0",glow:"#C0C0C030"},
  "Meio-campo":{bg:"#D4AF37",glow:"#D4AF3730"},
  "Atacante":{bg:"#E8B84B",glow:"#E8B84B30"}
};
const ATTRS=[
  {key:"velocidade",label:"Velocidade",icon:"🏃",color:"#F4D160"},
  {key:"tecnica",label:"Técnica",icon:"⚽",color:"#D4AF37"},
  {key:"fisico",label:"Físico",icon:"💪",color:"#C0C0C0"},
  {key:"finalizacao",label:"Finalização",icon:"🎯",color:"#E8B84B"},
  {key:"marcacao",label:"Marcação",icon:"🛡️",color:"#9A7B1A"},
];
// Team themes: each squad named like a "Galáticos" era, gold-tier identity
const TEAM_THEMES=[
  {name:"Galácticos Ouro",color:"#D4AF37",emoji:"👑"},
  {name:"Galácticos Prata",color:"#C0C0C0",emoji:"⚪"},
  {name:"Galácticos Bronze",color:"#B5763C",emoji:"🟤"},
  {name:"Galácticos Platina",color:"#E5E4E2",emoji:"⚫"},
];
const PLAYERS_PER_TEAM=5;

function loadPlayers(){try{return JSON.parse(localStorage.getItem("galaticosPlayers")||"[]");}catch(e){return[];}}
function savePlayers(p){try{localStorage.setItem("galaticosPlayers",JSON.stringify(p));}catch(e){}}
function totalScore(p){return ATTRS.reduce((s,a)=>s+(p.attrs?.[a.key]||0),0);}
function posColor(pos){return POS_COLORS[pos]||{bg:"#888",glow:"#88888830"};}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

function balancedDraw(players){
  const sorted=[...players].sort((a,b)=>totalScore(b)-totalScore(a));
  let i=0;
  const final=[...sorted];
  while(i<final.length){
    let j=i;
    const s=totalScore(final[i]);
    while(j<final.length&&totalScore(final[j])===s)j++;
    const chunk=shuffle(final.slice(i,j));
    chunk.forEach((p,k)=>{final[i+k]=p;});
    i=j;
  }
  const numTeams=Math.max(2,Math.ceil(final.length/PLAYERS_PER_TEAM));
  const teams=TEAM_THEMES.slice(0,numTeams).map(t=>({...t,players:[],total:0}));
  final.forEach((p,i)=>{
    const round=Math.floor(i/numTeams),pos=i%numTeams;
    const idx=round%2===0?pos:numTeams-1-pos;
    teams[idx].players.push(p);teams[idx].total+=totalScore(p);
  });
  return teams;
}

// ---- WhatsApp list parser ----
// Strips header lines (emoji-led info: schedule, location, PIX, price, rules) and
// numbered roster lines like "1. Lucas de Souza ✅" / "12. Gustavo (Convidado) ❌"
function parseWhatsappList(raw){
  const lines=raw.split(/\r?\n/);
  const results=[];
  const numberedLine=/^\s*(\d{1,3})[.\)\-]\s*(.+)$/;
  for(const lineRaw of lines){
    const line=lineRaw.trim();
    if(!line) continue;
    const m=line.match(numberedLine);
    if(!m) continue; // skip header/rules/footer lines, only numbered entries are players
    let rest=m[2];
    // detect confirmation marker anywhere in the line
    let presente=null;
    if(/✅|✔️|✔/.test(rest)) presente=true;
    if(/❌|✖️|✖/.test(rest)) presente=false;
    // detect "devendo" marker (owing) - treat as present but flagged
    const devendo=/⚠️|⚠/.test(rest);
    // detect convidado/guest tag in parentheses or plain text
    const convidado=/convidado/i.test(rest);
    // strip all known symbols/markers to isolate the name
    let name=rest
      .replace(/[✅✔️✔❌✖️✖⚠️⚠⚡]/g,'')
      .replace(/\(\s*convidado\s*\)/gi,'')
      .replace(/convidado/gi,'')
      .replace(/[⁠]/g,'') // zero-width / invisible chars often pasted from WhatsApp
      .replace(/\s{2,}/g,' ')
      .trim();
    name=name.replace(/^[-–—:]+|[-–—:]+$/g,'').trim();
    if(!name) continue;
    results.push({name,presente:presente===null?true:presente,convidado,devendo});
  }
  return results;
}

let state={tab:"jogadores",players:loadPlayers(),modal:null,filterPos:"Todos",drawn:null,drawing:false,importOpen:false,importText:"",importPreview:null,lotteryBalls:[],lotteryBall:null};

function attrsHTML(p,small=false){
  if(!p.attrs||ATTRS.every(a=>!(p.attrs[a.key]))){ return `<span class="pending-badge">⏳ SEM AVALIAÇÃO</span>`; }
  const total=totalScore(p);
  if(small){
    return `<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
      ${ATTRS.map(a=>`<span style="font-size:9px;background:${a.color}20;color:${a.color};border-radius:4px;padding:1px 5px;font-weight:700">${a.icon}${p.attrs[a.key]||0}</span>`).join('')}
      <span style="font-size:10px;color:var(--gold-bright);font-weight:700;margin-left:2px">=${total}</span>
    </div>`;
  }
  return `<div>${ATTRS.map(a=>`
    <div class="radar-row">
      <span class="radar-label">${a.icon} ${a.label}</span>
      <div class="radar-track"><div class="radar-fill" style="width:${((p.attrs[a.key]||0)/5)*100}%;background:${a.color}"></div></div>
      <span style="font-size:11px;color:${a.color};font-weight:700;width:16px;text-align:right">${p.attrs[a.key]||0}</span>
    </div>`).join('')}
    <div style="text-align:right;font-size:11px;color:var(--gold-bright);font-weight:700;margin-top:4px">Total: ${total}/25</div>
  </div>`;
}

function playerCardHTML(p){
  const c=posColor(p.position);
  const pending=!p.attrs||ATTRS.every(a=>!(p.attrs[a.key]));
  return `<div class="player-card" style="--col:${c.bg};--glow:${c.glow};--border:${pending?'#D4AF3735':c.bg+'35'}">
    <div class="player-avatar" style="--col:${c.bg}">${p.name.charAt(0)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:#f2ead8">${p.name}</span>
        <span class="pos-badge" style="background:${c.bg}">${p.position}</span>
        ${p.presente?'<span class="presente-badge">✅</span>':''}
        ${p.convidado?'<span class="convidado-badge">★ convidado</span>':''}
      </div>
      <div style="margin-top:4px">${attrsHTML(p,true)}</div>
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0">
      ${pending?`<button onclick="editPlayer('${p.id}')" style="background:#D4AF3720;border:1px solid #D4AF3740;border-radius:6px;color:var(--gold-bright);cursor:pointer;font-size:10px;padding:4px 7px;font-weight:700;white-space:nowrap;-webkit-appearance:none">📊 AVALIAR</button>`:''}
      <button onclick="editPlayer('${p.id}')" style="background:#fff1;border:1px solid #fff2;border-radius:6px;color:#aaa;cursor:pointer;font-size:12px;padding:4px 7px;-webkit-appearance:none">✏️</button>
      <button onclick="deletePlayer('${p.id}')" style="background:#f442;border:1px solid #f443;border-radius:6px;color:#f66;cursor:pointer;font-size:12px;padding:4px 7px;-webkit-appearance:none">🗑</button>
    </div>
  </div>`;
}

function modalHTML(){
  const p=state.modal;
  const pos=p?.position||"Goleiro";
  const c=posColor(pos);
  const attrs=p?.attrs||{};
  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">${p?.id?'✏️ Editar':'➕ Novo'} Jogador</div>
      <div class="field"><label>Nome</label><input id="f-name" value="${p?.name||''}" placeholder="Ex: Ronaldo"/></div>
      <div class="field"><label>Posição</label>
        <div class="pos-btns">${POSITIONS.map(pos2=>{const c2=posColor(pos2);const act=pos2===pos;
          return `<button class="pos-btn" onclick="setModalPos('${pos2}')" style="border:1.5px solid ${act?c2.bg:'#ffffff18'};background:${act?c2.bg+'30':'#ffffff08'};color:${act?c2.bg:'#766f5c'}">${pos2}</button>`;
        }).join('')}</div>
      </div>
      <div style="background:#ffffff06;border:1px solid var(--hairline);border-radius:12px;padding:14px;margin-bottom:4px">
        <div style="font-size:11px;font-weight:700;color:#a99a6e;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">📊 CARACTERÍSTICAS (1-5)</div>
        ${ATTRS.map(a=>`
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-size:12px;font-weight:700;color:${a.color}">${a.icon} ${a.label}</span>
              <span id="val-${a.key}" style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${a.color}">${attrs[a.key]||1}</span>
            </div>
            <input type="range" min="1" max="5" value="${attrs[a.key]||1}" 
              class="attr-slider" id="sl-${a.key}"
              oninput="document.getElementById('val-${a.key}').textContent=this.value"
              style="--c:${a.color};accent-color:${a.color}"/>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:#444;margin-top:2px">
              <span>Fraco</span><span>Regular</span><span>Bom</span><span>Ótimo</span><span>Elite</span>
            </div>
          </div>`).join('')}
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="save-btn" onclick="saveModal()" style="background:linear-gradient(135deg,${c.bg},${c.bg}bb)">SALVAR</button>
      </div>
    </div>
  </div>`;
}

function importModalHTML(){
  const preview=state.importPreview;
  return `<div class="overlay" onclick="if(event.target===this)closeImport()">
    <div class="modal" style="max-width:480px">
      <div class="modal-title">📲 Importar Lista do WhatsApp</div>
      ${!preview?`
        <div class="field">
          <label>Cole a lista completa abaixo</label>
          <textarea id="import-textarea" placeholder="Cole aqui a mensagem do grupo, com a numeração 1. 2. 3...">${state.importText}</textarea>
        </div>
        <div style="font-size:11px;color:#766f5c;margin-bottom:14px;line-height:1.5">
          O app identifica automaticamente os nomes numerados, ignora cabeçalho/regras/PIX, e marca quem confirmou (✅), quem não vai (❌) e quem é convidado.
        </div>
        <div class="modal-actions">
          <button class="cancel-btn" onclick="closeImport()">Cancelar</button>
          <button class="save-btn" onclick="runImportPreview()" style="background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep))">LER LISTA</button>
        </div>
      `:`
        <div style="font-size:12px;color:#a99a6e;margin-bottom:12px;font-weight:700">${preview.length} jogador(es) encontrado(s):</div>
        <div style="max-height:300px;overflow-y:auto;margin-bottom:8px">
          ${preview.map((pl,i)=>`
            <div class="import-preview-row">
              <span style="color:#f2ead8">${pl.name}${pl.convidado?' <span style="color:#cbb87c;font-size:10px">★ convidado</span>':''}${pl.devendo?' <span style="color:#ffb74d;font-size:10px">⚠ devendo</span>':''}</span>
              <span style="color:${pl.presente?'#2ECC71':'#ff6666'};font-weight:700;font-size:11px">${pl.presente?'✅ vai':'❌ não vai'}</span>
            </div>
          `).join('')}
        </div>
        <div class="gold-divider"></div>
        <div style="font-size:11px;color:#766f5c;margin-bottom:14px">
          Os jogadores serão adicionados ao elenco como <strong style="color:#cbb87c">Goleiro</strong> por padrão — você ajusta a posição e avalia as características depois, na aba Elenco.
        </div>
        <div class="modal-actions">
          <button class="cancel-btn" onclick="state.importPreview=null;renderAndBind()">⬅ Voltar</button>
          <button class="save-btn" onclick="confirmImport()" style="background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep))">ADICIONAR AO ELENCO</button>
        </div>
      `}
    </div>
  </div>`;
}

function render(){
  const {tab,players,filterPos,drawn,drawing,importOpen}=state;
  const presentes=players.filter(p=>p.presente);
  const pendingCount=players.filter(p=>!p.attrs||ATTRS.every(a=>!p.attrs[a.key])).length;
  const presenteCount=presentes.length;

  let html=`<div class="header"><div class="header-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:2px">
      <div class="crest">
        <span class="crest-emblem">👑</span>
        <div>
          <div class="logo">BABA DOS GALÁCTICOS</div>
          <div class="subtag">${players.length} jogadores · ${presenteCount} confirmados</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-ghost" onclick="openImport()">📲 LISTA</button>
        ${tab==="jogadores"?`<button class="btn-add" onclick="openModal()">+ ADD</button>`:''}
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab==='jogadores'?'active':''}" onclick="setTab('jogadores')">👤 ELENCO${pendingCount>0?` <span style="background:var(--gold-bright);color:#0a0a0a;border-radius:8px;padding:0 5px;font-size:9px">${pendingCount}</span>`:''}</button>
      <button class="tab-btn ${tab==='presenca'?'active':''}" onclick="setTab('presenca')">✅ PRESENÇA${presenteCount>0?` <span style="background:#2ECC71;color:#000;border-radius:8px;padding:0 5px;font-size:9px">${presenteCount}</span>`:''}</button>
      <button class="tab-btn ${tab==='sorteio'?'active':''}" onclick="setTab('sorteio')">⚽ SORTEAR</button>
    </div>
  </div></div><div class="content">`;

  if(tab==="jogadores"){
    const filtered=filterPos==="Todos"?players:players.filter(p=>p.position===filterPos);
    html+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">
      ${["Todos",...POSITIONS].map(pos=>{const c=pos==="Todos"?"#D4AF37":posColor(pos).bg;const act=filterPos===pos;
        return `<button onclick="setFilter('${pos}')" style="padding:4px 10px;border-radius:6px;border:1.5px solid ${act?c:'#ffffff15'};background:${act?c+'25':'#ffffff08'};color:${act?c:'#766f5c'};font-weight:700;font-size:10px;cursor:pointer;-webkit-appearance:none">${pos}</button>`;
      }).join('')}
    </div>`;
    if(!filtered.length)html+=`<div class="empty"><div style="font-size:36px;margin-bottom:10px">⚽</div><div style="font-weight:700">Nenhum jogador</div><div style="font-size:12px;margin-top:6px">Toque em "📲 LISTA" para importar do WhatsApp</div></div>`;
    else filtered.forEach(p=>{html+=playerCardHTML(p);});
  }

  if(tab==="presenca"){
    const ausentes=players.filter(p=>!p.presente);
    html+=`<div style="background:#2ECC7110;border:1px solid #2ECC7130;border-radius:12px;padding:13px 15px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#2ECC71;line-height:1">${presentes.length}</div><div style="font-size:10px;color:#2ECC71bb;font-weight:700;text-transform:uppercase">Confirmados</div></div>
      <div style="text-align:right"><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#ff6666;line-height:1">${ausentes.length}</div><div style="font-size:10px;color:#ff6666bb;font-weight:700;text-transform:uppercase">Pendentes</div></div>
    </div>`;
    if(presentes.length){
      html+=`<div class="section-label" style="color:#2ECC71;margin-bottom:10px">✅ CONFIRMADOS (${presentes.length})</div>`;
      presentes.forEach(p=>{
        const c=posColor(p.position);
        html+=`<div style="background:linear-gradient(135deg,#162e1a,#1a2e1a);border:1.5px solid #2ECC7140;border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,${c.bg},${c.bg}88);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:#0a0a0a;font-weight:900;flex-shrink:0">${p.name.charAt(0)}</div>
          <div style="flex:1"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:#f2ead8">${p.name}</span>
            <span class="pos-badge" style="background:${c.bg}">${p.position}</span>
            ${p.convidado?'<span class="convidado-badge">★ convidado</span>':''}
          </div><div style="margin-top:4px">${attrsHTML(p,true)}</div></div>
          <button onclick="cancelarPresenca('${p.id}')" style="background:#ff444415;border:1px solid #ff444430;border-radius:6px;color:#ff6666;cursor:pointer;font-size:10px;padding:5px 8px;font-weight:700;white-space:nowrap;-webkit-appearance:none">✕ RETIRAR</button>
        </div>`;
      });
    }
    if(ausentes.length){
      html+=`<div class="section-label" style="margin:14px 0 10px">⏳ PENDENTES (${ausentes.length})</div>`;
      ausentes.forEach(p=>{
        const c=posColor(p.position);
        html+=`<div style="background:#ffffff05;border:1.5px solid #ffffff0d;border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:8px;opacity:0.65">
          <div style="width:36px;height:36px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:#666;font-weight:900;flex-shrink:0">${p.name.charAt(0)}</div>
          <div style="flex:1"><span style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:#666">${p.name}</span>
            <span class="pos-badge" style="background:#333;color:#666;margin-left:6px">${p.position}</span></div>
          <button onclick="marcarPresente('${p.id}')" style="background:#2ECC7115;border:1px solid #2ECC7130;border-radius:6px;color:#2ECC71;cursor:pointer;font-size:10px;padding:5px 8px;font-weight:700;white-space:nowrap;-webkit-appearance:none">+ MARCAR</button>
        </div>`;
      });
    }
    if(!players.length)html+=`<div class="empty"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700">Nenhum jogador cadastrado</div><div style="font-size:12px;margin-top:6px">Toque em "📲 LISTA" para importar do WhatsApp</div></div>`;
  }

  if(tab==="sorteio"){
    const pool=presentes.filter(p=>p.attrs&&ATTRS.some(a=>p.attrs[a.key]>0));
    const naoAvaliados=presentes.length-pool.length;
    const numTeams=Math.max(2,Math.ceil(pool.length/PLAYERS_PER_TEAM));
    const canDraw=pool.length>=PLAYERS_PER_TEAM;

    html+=`<div style="background:#ffffff05;border:1px solid var(--hairline);border-radius:14px;padding:14px;margin-bottom:16px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:#a99a6e;margin-bottom:8px">📊 PRONTOS PARA O SORTEIO</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div><span style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold-bright)">${pool.length}</span><span style="font-size:12px;color:#766f5c;margin-left:6px">jogadores avaliados</span></div>
        <div style="font-size:11px;color:#766f5c">${numTeams} times de ~${PLAYERS_PER_TEAM}</div>
      </div>
      ${naoAvaliados>0?`<div style="font-size:11px;color:var(--gold-bright);margin-top:8px">⚠️ ${naoAvaliados} confirmado(s) ainda sem avaliação — vá em ELENCO e toque em "AVALIAR"</div>`:''}
    </div>`;

    if(drawing){
      html+=lotteryHTML();
    } else if(!drawn){
      html+=`<button class="draw-btn ${canDraw?'ready':'disabled'}" ${canDraw?'onclick="doDraw()"':''}>
        ${canDraw?`👑 SORTEAR TIMES`:`Mínimo ${PLAYERS_PER_TEAM} jogadores avaliados`}
      </button>`;
    } else {
      drawn.forEach((team,teamIdx)=>{
        html+=`<div class="team-card revealing" style="--tc:${team.color};animation-delay:${teamIdx*0.12}s">
          <div style="background:linear-gradient(135deg,${team.color}22,${team.color}08);padding:13px 15px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">${team.emoji}</span>
              <span style="font-family:'Cinzel',serif;font-weight:800;font-size:15px;color:${team.color};letter-spacing:0.5px">${team.name}</span>
            </div>
            <span style="font-size:11px;color:#a99a6e;font-weight:700">Força: ${team.total}</span>
          </div>
          <div style="background:#00000030;padding:8px">
            ${team.players.map(p=>{const c=posColor(p.position);
              return `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px">
                <div style="width:26px;height:26px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0a0a0a;font-family:'Bebas Neue',sans-serif;flex-shrink:0">${p.name.charAt(0)}</div>
                <span style="font-size:13px;color:#f2ead8;flex:1">${p.name}</span>
                <span style="font-size:9px;color:${c.bg};font-weight:700">${p.position}</span>
                <span style="font-size:10px;color:var(--gold-bright);font-weight:700">${totalScore(p)}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });
      html+=`<button class="reshuffle-btn" onclick="doDraw()">🔄 SORTEAR DE NOVO</button>`;
    }
  }

  html+="</div>";
  document.getElementById("app").innerHTML=html+(state.modal?modalHTML():'')+(state.importOpen?importModalHTML():'');
}

function lotteryHTML(){
  const ball=state.lotteryBall||{};
  const colors=["#D4AF37","#F4D160","#C0C0C0","#E8B84B","#9A7B1A"];
  const balls=(state.lotteryBalls||[]).map((p,i)=>
    `<div class="lottery-ball" style="background:${colors[i%colors.length]};animation-delay:${(i*0.07)%0.6}s">${p.name.charAt(0)}</div>`
  ).join('');
  return `<div class="lottery-wrap">
    <div class="lottery-title">👑 SORTEANDO OS GALÁCTICOS 👑</div>
    <div class="lottery-drum">${balls}</div>
    <div class="lottery-status">${ball.text?`<span class="name-pop">${ball.text}</span>`:'embaralhando o elenco...'}</div>
  </div>`;
}

function renderAndBind(){
  render();
  const ta=document.getElementById('import-textarea');
  if(ta){ ta.addEventListener('input',e=>{state.importText=e.target.value;}); }
}

// ---- actions ----
function setTab(t){
  if(state.drawing) return; // evita trocar de aba no meio da animação de sorteio
  state.tab=t;state.drawn=null;renderAndBind();
}
function setFilter(p){state.filterPos=p;renderAndBind();}

function openModal(){state.modal={position:"Goleiro",attrs:{}};renderAndBind();}
function editPlayer(id){state.modal=JSON.parse(JSON.stringify(state.players.find(p=>p.id===id)));renderAndBind();}
function closeModal(){state.modal=null;renderAndBind();}
function setModalPos(pos){state.modal.position=pos;renderAndBind();}
function saveModal(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Digite o nome do jogador');return;}
  const attrs={};
  ATTRS.forEach(a=>{const el=document.getElementById('sl-'+a.key);attrs[a.key]=el?parseInt(el.value):1;});
  const m=state.modal;
  if(m.id){
    const idx=state.players.findIndex(p=>p.id===m.id);
    state.players[idx]={...state.players[idx],name,position:m.position,attrs};
  } else {
    state.players.push({id:uid(),name,position:m.position,attrs,presente:false,convidado:false});
  }
  savePlayers(state.players);
  state.modal=null;
  renderAndBind();
}
function deletePlayer(id){
  if(!confirm('Remover este jogador?'))return;
  state.players=state.players.filter(p=>p.id!==id);
  savePlayers(state.players);
  renderAndBind();
}
function marcarPresente(id){
  const p=state.players.find(x=>x.id===id);if(p)p.presente=true;
  savePlayers(state.players);renderAndBind();
}
function cancelarPresenca(id){
  const p=state.players.find(x=>x.id===id);if(p)p.presente=false;
  savePlayers(state.players);renderAndBind();
}

// ---- draw with lottery animation ----
function doDraw(){
  const presentes=state.players.filter(p=>p.presente);
  const pool=presentes.filter(p=>p.attrs&&ATTRS.some(a=>p.attrs[a.key]>0));
  if(pool.length<PLAYERS_PER_TEAM)return;

  state.drawn=null;
  state.drawing=true;
  state.lotteryBalls=shuffle(pool);
  state.lotteryBall={text:''};
  renderAndBind();

  const finalTeams=balancedDraw(pool);
  // build a flat reveal order: round-robin across teams, so names get "called out"
  // alternating teams rather than filling one team fully before the next
  const maxLen=Math.max(...finalTeams.map(t=>t.players.length));
  const revealSequence=[];
  for(let i=0;i<maxLen;i++){
    finalTeams.forEach(team=>{
      if(team.players[i]) revealSequence.push({player:team.players[i],team});
    });
  }

  let step=0;
  const stepDuration=650;
  const timer=setInterval(()=>{
    if(step>=revealSequence.length){
      clearInterval(timer);
      state.drawing=false;
      state.drawn=finalTeams;
      state.lotteryBall=null;
      renderAndBind();
      return;
    }
    const {player,team}=revealSequence[step];
    state.lotteryBall={text:`${player.name} → ${team.emoji} ${team.name}`};
    // drum visibly empties as each name gets called
    state.lotteryBalls=state.lotteryBalls.filter(p=>p.id!==player.id);
    renderAndBind();
    step++;
  },stepDuration);
}

// ---- import flow ----
function openImport(){state.importOpen=true;state.importPreview=null;state.importText="";renderAndBind();}
function closeImport(){state.importOpen=false;state.importPreview=null;renderAndBind();}
function runImportPreview(){
  const raw=document.getElementById('import-textarea').value;
  const parsed=parseWhatsappList(raw);
  if(!parsed.length){alert('Não encontrei nenhum nome numerado na lista. Confira se colou o texto completo, com a numeração (1. 2. 3...).');return;}
  state.importText=raw;
  state.importPreview=parsed;
  renderAndBind();
}
function confirmImport(){
  const parsed=state.importPreview;
  const existingNames=new Set(state.players.map(p=>p.name.toLowerCase()));
  let added=0,updated=0;
  parsed.forEach(pl=>{
    const lower=pl.name.toLowerCase();
    const existing=state.players.find(p=>p.name.toLowerCase()===lower);
    if(existing){
      existing.presente=pl.presente;
      existing.convidado=pl.convidado||existing.convidado;
      updated++;
    } else {
      state.players.push({
        id:uid(),
        name:pl.name,
        position:"Goleiro",
        attrs:{},
        presente:pl.presente,
        convidado:pl.convidado
      });
      added++;
    }
  });
  savePlayers(state.players);
  state.importOpen=false;
  state.importPreview=null;
  state.tab="presenca";
  renderAndBind();
}

renderAndBind();
</script>
