<script type="module">
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

const db = window.db.database;
const playersRefDB = window.db.playersRefDB;

// Atributos disponíveis
const ATTRIBUTES = [
  { id: "velocidade", name: "⚡ Velocidade", icon: "⚡", max: 10 },
  { id: "drible", name: "🪄 Drible", icon: "🪄", max: 10 },
  { id: "chute", name: "🎯 Chute", icon: "🎯", max: 10 },
  { id: "passe", name: "🔄 Passe", icon: "🔄", max: 10 },
  { id: "defesa", name: "🛡️ Defesa", icon: "🛡️", max: 10 }
];

const POSITIONS = ["Goleiro","Fixo","Ala","Pivô"];
const POS_COLORS = {
  "Goleiro": {bg:"#FF6B35", glow:"#FF6B3530"},
  "Fixo":    {bg:"#00C2FF", glow:"#00C2FF30"},
  "Ala":     {bg:"#9B59B6", glow:"#9B59B630"},
  "Pivô":    {bg:"#2ECC71", glow:"#2ECC7130"}
};

const QUALITY_LABELS = {1:"⭐ Iniciante",2:"⭐⭐ Regular",3:"⭐⭐⭐ Bom",4:"⭐⭐⭐⭐ Ótimo",5:"⭐⭐⭐⭐⭐ Elite"};
const TEAM_THEMES = [
  {name:"Galácticos A",color:"#FF4444",emoji:"⭐"},
  {name:"Galácticos B",color:"#4488FF",emoji:"⭐"},
  {name:"Galácticos C",color:"#44CC44",emoji:"⭐"},
  {name:"Galácticos D",color:"#FFB800",emoji:"⭐"}
];

const PLAYERS_PER_TEAM = 5;
let state = {tab:"jogadores",players:[],loading:true,modal:null,filterPos:"Todos",numTeams:2,selected:new Set(),drawn:null,drawing:false};

// Calcula overall baseado nos atributos
function calculateOverall(attrs) {
  if(!attrs) return 0;
  const values = ATTRIBUTES.map(a => attrs[a.id] || 0);
  const sum = values.reduce((a,b) => a + b, 0);
  return Math.round(sum / ATTRIBUTES.length);
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function snakeDraft(sorted, teams) {
  let idx=0, round=0;
  const n=teams.length;
  while(idx<sorted.length){
    const dir=round%2===0?1:-1;
    const start=round%2===0?0:n-1;
    for(let step=0;step<n&&idx<sorted.length;step++){
      const t=teams[start+step*dir];
      t.players.push(sorted[idx]);
      t.total += sorted[idx].overall || 0;
      idx++;
    }
    round++;
  }
}

function balancedDraw(players, n) {
  const teams=TEAM_THEMES.slice(0,n).map(t=>({...t,players:[],total:0}));
  const byPos={};
  POSITIONS.forEach(pos=>{byPos[pos]=[];});
  players.forEach(p=>{(byPos[p.position]||(byPos["Outros"]=byPos["Outros"]||[])).push(p);});

  function sortByOverall(arr){
    return [...arr].sort((a,b) => (b.overall||0) - (a.overall||0));
  }

  snakeDraft(sortByOverall(byPos["Goleiro"]||[]), teams);
  snakeDraft(sortByOverall(byPos["Fixo"]||[]), teams);
  snakeDraft(sortByOverall([...(byPos["Ala"]||[]), ...(byPos["Pivô"]||[]), ...(byPos["Outros"]||[])]), teams);
  return teams;
}

function posColor(pos){return POS_COLORS[pos]||{bg:"#888",glow:"#88888830"};}
function stars(val){return[1,2,3,4,5].map(s=>`<span style="font-size:14px;color:${s<=(val||0)?'#FFD700':'#2a2a3a'}">★</span>`).join('');}

function playerCardHTML(p,selectable=false){
  const c=posColor(p.position);const sel=selectable&&state.selected.has(p.id);
  const overall = p.overall || calculateOverall(p.attributes);
  const overallStars = Math.floor(overall / 2);
  
  let statsHTML = `<div class="stats-row">`;
  if(p.attributes) {
    const attrs = ATTRIBUTES.map(a => `<span class="stat-pill"><strong>${a.icon}</strong> ${p.attributes[a.id]||0}</span>`);
    statsHTML += attrs.slice(0,3).join('');
    statsHTML += `<span class="stat-pill"><strong>⭐</strong> ${overall}</span>`;
  } else {
    statsHTML += `<span class="stat-pill pending-badge">⏳ SEM ATRIBUTOS</span>`;
  }
  statsHTML += `</div>`;

  return `<div class="player-card ${sel?'selected':''}" style="--col:${c.bg};--glow:${c.glow};--border:${sel?c.bg:'#ffffff30'};cursor:${selectable?'pointer':'default'}" data-action="${selectable?'toggle':''}" data-id="${p.id}">
    ${selectable?`<div class="check-circle ${sel?'on':''}" style="--col:${c.bg}">${sel?'✓':''}</div>`:''}
    <div class="player-avatar" style="--col:${c.bg};--glow:${c.glow}">${p.name.charAt(0)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span class="player-name">${p.name}</span>
        <span class="pos-badge" style="background:${c.bg}">${p.position}</span>
        <span class="quality-label">${stars(overallStars)}</span>
      </div>
      ${statsHTML}
    </div>
    ${!selectable?`<div style="display:flex;gap:5px;flex-shrink:0">
      <button class="edit-btn" data-action="edit" data-id="${p.id}">✏️</button>
      <button class="del-btn" data-action="delete" data-id="${p.id}">🗑</button>
    </div>`:''}
  </div>`;
}

function modalHTML(){
  const p=state.modal;const pos=p?.position||"Goleiro";const c=posColor(pos);
  const attrs = p?.attributes || {velocidade:5,drible:5,chute:5,passe:5,defesa:5};
  const overall = calculateOverall(attrs);
  
  return `<div class="overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">${p?.id?'✏️ Editar Jogador':'➕ Novo Jogador'}</div>
      <div class="field"><label>Nome</label><input id="f-name" value="${p?.name||''}" placeholder="Ex: Falcão" style="border-color:#ffffff18"/></div>
      <div class="field"><label>Clube</label><input id="f-club" value="${p?.club||''}" placeholder="Ex: Magnus" style="border-color:#ffffff18"/></div>
      <div class="field"><label>Posição</label>
        <div class="pos-btns">
          ${POSITIONS.map(pos2=>{const c2=posColor(pos2);const act=pos2===pos;return `<button class="pos-btn" data-action="setpos" data-pos="${pos2}" style="border:1.5px solid ${act?c2.bg:'#ffffff18'};background:${act?c2.bg+'30':'#ffffff08'};color:${act?c2.bg:'#666'}">${pos2}</button>`;}).join('')}
        </div>
      </div>
      <div class="field"><label>⚡ ATRIBUTOS</label>
        <div class="attr-grid">
          ${ATTRIBUTES.map(attr => `
            <div class="attr-item">
              <div class="attr-header"><span>${attr.name}</span><span class="attr-value" id="val-${attr.id}">${attrs[attr.id]||5}</span></div>
              <input type="range" class="attr-slider" data-attr="${attr.id}" min="0" max="${attr.max}" value="${attrs[attr.id]||5}" step="1" style="width:100%"/>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="overall-badge">
        <div style="font-size:10px;letter-spacing:2px;opacity:0.8">OVERALL</div>
        <div class="overall-number" id="overall-preview">${overall}</div>
        <div style="font-size:10px">${stars(Math.floor(overall/2))}</div>
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" data-action="closemodal">Cancelar</button>
        <button class="save-btn" data-action="savemodal" style="background:linear-gradient(135deg,${c.bg},${c.bg}bb)">SALVAR</button>
      </div>
    </div>
  </div>`;
}

function render(){
  const {tab,players,loading,filterPos,numTeams,selected,drawn,drawing}=state;
  if(loading){document.getElementById("app").innerHTML=`<div class="loading-screen"><div class="big-spinner"></div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#555">CARREGANDO...</div></div>`;return;}

  const filteredPlayers=filterPos==="Todos"?players:players.filter(p=>p.position===filterPos);
  const pendingCount=players.filter(p=>!p.attributes || Object.values(p.attributes).every(v=>v===0)).length;
  const presenteCount=players.filter(p=>p.presente===true).length;

  let html=`<div class="header"><div class="header-inner">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:2px">
      <div><div class="logo">⭐ BABA DOS GALÁTICOS</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
        <span style="font-size:11px;color:#555;letter-spacing:1px">${players.length} jogadores · Elenco Galáctico</span>
      </div></div>
      <div style="display:flex;gap:7px"><button class="btn-share" data-action="share">📲 CONVIDAR</button>
      ${tab==="jogadores"?`<button class="btn-add" data-action="openmodal">+ ADD</button>`:''}</div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab==='jogadores'?'active':''}" data-action="tab" data-tab="jogadores">👤 ELENCO${pendingCount>0?` <span style="background:#FFD700;color:#000;border-radius:10px;padding:1px 6px;font-size:10px">${pendingCount}</span>`:''}</button>
      <button class="tab-btn ${tab==='presenca'?'active':''}" data-action="tab" data-tab="presenca">✅ PRESENÇA${presenteCount>0?` <span style="background:#2ECC71;color:#000;border-radius:10px;padding:1px 6px;font-size:10px">${presenteCount}</span>`:''}</button>
      <button class="tab-btn ${tab==='sorteio'?'active':''}" data-action="tab" data-tab="sorteio">⚽ SORTEAR</button>
    </div>
  </div></div><div class="content">`;

  if(tab==="jogadores"){
    html+=`<div class="filter-bar"><button class="fbtn ${filterPos==='Todos'?'active':''}" style="--c:#FFD700" data-action="filter" data-pos="Todos">Todos</button>${POSITIONS.map(pos=>{const c=posColor(pos);return `<button class="fbtn ${filterPos===pos?'active':''}" style="--c:${c.bg}" data-action="filter" data-pos="${pos}">${pos}</button>`;}).join('')}</div>`;
    if(!filteredPlayers.length){html+=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">⭐</div><div style="font-weight:700;font-size:15px">Nenhum jogador cadastrado</div></div>`;}
    else filteredPlayers.forEach(p=>{html+=playerCardHTML(p,false);});
  }

  if(tab==="presenca"){
    const presentes=players.filter(p=>p.presente===true).sort((a,b)=>(a.confirmedAt||0)-(b.confirmedAt||0));
    const ausentes=players.filter(p=>!p.presente);
    html+=`<div style="background:#2ECC7110;border:1px solid #2ECC7130;border-radius:14px;padding:14px 16px;margin-bottom:20px;display:flex;justify-content:space-between">
      <div><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#2ECC71">${presentes.length}</div><div style="font-size:11px;color:#2ECC71bb">Confirmados</div></div>
      <div style="text-align:right"><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#ff6666">${ausentes.length}</div><div style="font-size:11px;color:#ff6666bb">Pendentes</div></div>
    </div>`;
    presentes.forEach(p=>{html+=playerCardHTML(p,false);});
    if(ausentes.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:#666;margin:16px 0 10px">⏳ Aguardando confirmação (${ausentes.length})</div>`;
      ausentes.forEach(p=>{
        const c=posColor(p.position);
        html+=`<div style="background:#ffffff06;border:1.5px solid #ffffff10;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;opacity:0.6">
          <div class="player-avatar" style="background:#333;box-shadow:none">${p.name.charAt(0)}</div>
          <div style="flex:1"><span class="player-name" style="color:#666">${p.name}</span><span class="pos-badge" style="background:#333;color:#666">${p.position}</span></div>
          <button style="background:#ffffff08;border:1px solid #ffffff15;border-radius:7px;color:#aaa;padding:5px 9px;cursor:pointer" data-action="marcar-presente" data-id="${p.id}">+ MARCAR</button>
        </div>`;
      });
    }
  }

  if(tab==="sorteio"){
    const presentes=players.filter(p=>p.presente===true);
    const presentesComAtributos=presentes.filter(p=>p.attributes && calculateOverall(p.attributes)>0);
    const canDraw=presentesComAtributos.length>=numTeams*2;
    
    html+=`<div class="config-card"><div class="config-title">⚙️ CONFIGURAR SORTEIO</div>
      <div class="section-label">Número de times</div>
      <div class="num-btns">${[2,3,4].map(n=>`<button class="num-btn ${numTeams===n?'active':''}" data-action="numteams" data-n="${n}">${n}</button>`).join('')}</div>
      <div style="background:#2ECC7110;border:1px solid #2ECC7130;border-radius:10px;padding:10px 14px">
        <span style="font-size:13px;font-weight:700;color:#2ECC71">${presentes.length} confirmados</span>
        <span style="font-size:11px;color:#555;margin-left:6px">(${presentesComAtributos.length} com atributos)</span>
      </div>
    </div>
    ${presentes.length>0?`<div class="section-label">Jogadores confirmados</div>${presentes.map(p=>playerCardHTML(p,false)).join('')}`:''}
    <button class="draw-btn ${canDraw?'ready':'disabled'}" data-action="draw" ${!canDraw?'disabled':''}>${drawing?`<div class="spinner"></div>`:'⭐ SORTEAR TIMES GALÁTICOS ⭐'}</button>`;

    if(drawn&&!drawing){
      const maxPts=Math.max(...drawn.map(t=>t.total),1);
      html+=`<div class="quality-bar-card"><div class="section-label">Equilíbrio</div>${drawn.map(t=>`<div class="bar-row"><span style="width:78px;color:${t.color}">${t.name}</span><div class="bar-track"><div class="bar-fill" style="width:${(t.total/maxPts)*100}%;background:${t.color}"></div></div><span style="color:#FFD700;width:26px">${t.total}</span></div>`).join('')}</div>
      <div class="teams-grid">${drawn.map(t=>{
        const posEmojis={"Goleiro":"🧤","Fixo":"🛡️","Ala":"⚡","Pivô":"🎯"};
        return `<div class="team-card" style="--tc:${t.color}44">
          <div style="background:linear-gradient(135deg,${t.color}33,${t.color}11);padding:13px 15px;display:flex;justify-content:space-between;border-bottom:1px solid ${t.color}44">
            <div><span style="font-size:22px">${t.emoji}</span><span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:${t.color}"> ${t.name}</span></div>
            <div><span style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:#FFD700">${t.total}</span></div>
          </div>
          <div style="padding:11px 14px">${t.players.map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span>${posEmojis[p.position]||'⭐'}</span><span style="flex:1">${p.name}</span><span>${stars(Math.floor((p.overall||0)/2))}</span></div>`).join('')}</div>
        </div>`;
      }).join('')}</div>
      <button class="reshuffle-btn" data-action="draw">🔄 SORTEAR NOVAMENTE</button>`;
    }
  }
  html+=`</div>`;
  if(state.modal!==null) html+=modalHTML();
  document.getElementById("app").innerHTML=html;

  // Bind dos sliders
  if(state.modal){
    ATTRIBUTES.forEach(attr => {
      const slider = document.querySelector(`.attr-slider[data-attr="${attr.id}"]`);
      if(slider){
        slider.oninput = (e) => {
          const val = e.target.value;
          document.getElementById(`val-${attr.id}`).innerText = val;
          if(!state.modal.attributes) state.modal.attributes = {};
          state.modal.attributes[attr.id] = parseInt(val);
          const newOverall = calculateOverall(state.modal.attributes);
          document.getElementById("overall-preview").innerHTML = newOverall;
        };
      }
    });
  }
}

function getModalFields(){
  const attrs = {};
  ATTRIBUTES.forEach(attr => { attrs[attr.id] = parseInt(document.querySelector(`.attr-slider[data-attr="${attr.id}"]`)?.value || 5); });
  return {
    name: (document.getElementById("f-name")?.value||"").trim(),
    club: (document.getElementById("f-club")?.value||"").trim(),
    position: state.modal?.position||"Goleiro",
    attributes: attrs,
    overall: calculateOverall(attrs)
  };
}

document.addEventListener("click", e => {
  const el = e.target.closest("[data-action]"); if(!el) return;
  const action = el.dataset.action, id = el.dataset.id;
  if(action==="tab"){state.tab=el.dataset.tab;state.drawn=null;render();}
  else if(action==="filter"){state.filterPos=el.dataset.pos;render();}
  else if(action==="openmodal"){state.modal={position:"Goleiro",attributes:{velocidade:5,drible:5,chute:5,passe:5,defesa:5}};render();}
  else if(action==="closemodal"){state.modal=null;render();}
  else if(action==="edit"){const p=state.players.find(p=>p.id===id);state.modal={...p,attributes:p.attributes||{velocidade:5,drible:5,chute:5,passe:5,defesa:5}};render();}
  else if(action==="delete"){if(confirm("Remover jogador?")){remove(ref(db,`jogadores/${id}`));render();}}
  else if(action==="setpos"){state.modal={...state.modal,position:el.dataset.pos};render();}
  else if(action==="savemodal"){
    const d=getModalFields(); if(!d.name) return;
    if(state.modal?.id){ update(ref(db,`jogadores/${state.modal.id}`), d); }
    else{ push(ref(db,'jogadores'), d); }
    state.modal=null; render();
  }
  else if(action==="numteams"){state.numTeams=parseInt(el.dataset.n);state.drawn=null;render();}
  else if(action==="draw"){
    const pool=state.players.filter(p=>p.presente===true && p.attributes && calculateOverall(p.attributes)>0).map(p=>({...p, overall:calculateOverall(p.attributes)}));
    if(pool.length<state.numTeams*2) return;
    state.drawing=true; render();
    setTimeout(()=>{state.drawn=balancedDraw(pool,state.numTeams); state.drawing=false; render();}, 500);
  }
  else if(action==="marcar-presente"){ update(ref(db,`jogadores/${id}`), {presente:true,confirmedAt:Date.now()}); render(); }
  else if(action==="cancelar-presenca"){ if(confirm("Retirar presença?")) update(ref(db,`jogadores/${id}`), {presente:false,confirmedAt:null}); render(); }
  else if(action==="share"){ const url=window.location.href.split('?')[0].split('#')[0]; if(navigator.share){navigator.share({title:"Baba dos Galáticos ⭐",text:"Venha jogar!",url});} else{navigator.clipboard.writeText(url).then(()=>alert("Link copiado!\n"+url));} }
  if(el.id==="modal-overlay"){state.modal=null;render();}
});

const ADM_PASSWORD = "baba123";
let selectedLoginPos = null;
function showLogin(){ document.getElementById("login-screen").style.display="flex"; document.getElementById("app").style.display="none"; }
function showApp(){ document.getElementById("login-screen").style.display="none"; document.getElementById("success-screen").style.display="none"; document.getElementById("app").style.display="block"; }
function showSuccess(name){ document.getElementById("login-screen").style.display="none"; document.getElementById("success-screen").style.display="flex"; document.getElementById("success-player-name").textContent="Bem-vindo, "+name+"! ⭐"; }

document.getElementById("pos-grid-login")?.addEventListener("click",e=>{
  const card=e.target.closest("[data-pos]"); if(!card) return;
  document.querySelectorAll("#pos-grid-login [data-pos]").forEach(c=>{c.style.borderColor="#ffffff12";c.style.background="#ffffff07";c.querySelector("div:last-child").style.color="#aaa";});
  const c=POS_COLORS[card.dataset.pos]?.bg||"#FFD700";
  card.style.borderColor=c; card.style.background=c+"30"; card.querySelector("div:last-child").style.color=c;
  selectedLoginPos=card.dataset.pos;
});

document.getElementById("login-player-btn")?.addEventListener("click",async()=>{
  const name=document.getElementById("login-name").value.trim();
  if(!name||!selectedLoginPos){alert("Preencha nome e posição!");return;}
  const btn=document.getElementById("login-player-btn"); btn.textContent="VERIFICANDO..."; btn.disabled=true;
  const snapshot = await new Promise((resolve) => { onValue(playersRefDB, resolve, { onlyOnce: true }); });
  const data = snapshot.val() || {};
  const existing = Object.entries(data).find(([id,p]) => p.name && p.name.toLowerCase() === name.toLowerCase());
  if(!existing){ document.getElementById("login-error").style.display="block"; btn.textContent="CONFIRMAR PRESENÇA"; btn.disabled=false; return; }
  document.getElementById("login-error").style.display="none";
  update(ref(db,`jogadores/${existing[0]}`), {position:selectedLoginPos, presente:true, confirmedAt:Date.now()});
  showSuccess(existing[1].name);
});

document.getElementById("login-adm-btn")?.addEventListener("click",()=>{
  const pw=document.getElementById("adm-password").value;
  if(pw===ADM_PASSWORD){ localStorage.setItem("adm","1"); showApp(); state.loading=false; }
  else { document.getElementById("adm-error").style.display="block"; }
});

onValue(playersRefDB, (snapshot) => {
  const data = snapshot.val() || {};
  state.players = Object.entries(data).map(([id,p]) => ({id,...p, overall: p.overall || calculateOverall(p.attributes)})).sort((a,b)=>a.name.localeCompare(b.name));
  state.players.forEach(p => state.selected.add(p.id));
  state.loading = false;
  render();
});

if(localStorage.getItem("adm")==="1"){ showApp(); } else { showLogin(); }
</script>
</body>
</html>
