<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>⚽ Baba dos Galáticos Firebase</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:#06111f;
color:#fff;
padding:20px;
}

header{
background:linear-gradient(90deg,#f1c40f,#ffd700);
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#000;
border-radius:16px;
margin-bottom:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:18px;
border:1px solid #22304d;
}

h2{
color:#ffd700;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
}

input,select{
background:#1f2937;
color:#fff;
}

button{
background:#2563eb;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.admin{
background:#dc2626;
}

.gold{
background:#f1c40f;
color:#000;
}

.player{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-top:8px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<header>⚽ BABA DOS GALÁTICOS ONLINE</header>

<div class="container">

<div class="grid">

<!-- INSCRIÇÃO -->
<div class="card">
<h2>📝 Inscrição</h2>

<input type="text" id="nome" placeholder="Seu nome">

<select id="posicao">
<option>Linha</option>
<option>Goleiro</option>
</select>

<button onclick="inscrever()">Entrar no Baba</button>
</div>

<!-- ADM -->
<div class="card">
<h2>👑 ADM</h2>

<button class="admin" onclick="loginADM()">Entrar</button>

<div id="painelADM" style="display:none;">

<input type="text" id="nomeADM" placeholder="Nome jogador">

<select id="notaADM">
<option value="1">⭐1</option>
<option value="2">⭐2</option>
<option value="3">⭐3</option>
<option value="4">⭐4</option>
<option value="5">⭐5</option>
</select>

<button class="gold" onclick="editarNota()">Salvar Estrelas</button>

<button onclick="limpar()">🗑️ Limpar Lista</button>

</div>
</div>

</div>

<div class="card" style="margin-top:20px;">
<h2>📋 Lista Ao Vivo</h2>
<div id="lista"></div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
deleteDoc,
doc,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// COLE AQUI O MESMO FIREBASE ANTERIOR
const firebaseConfig = {
apiKey: "SUA_KEY",
authDomain: "SEU_DOMINIO",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

// inscrição
window.inscrever = async function(){

let nome = document.getElementById("nome").value.trim();
let pos = document.getElementById("posicao").value;

if(nome==""){
alert("Digite nome");
return;
}

await addDoc(collection(db,"jogadores"),{
nome:nome,
pos:pos,
nota:3
});

document.getElementById("nome").value="";

alert("Inscrição feita!");

}

// lista ao vivo
onSnapshot(query(collection(db,"jogadores")), (snapshot)=>{

let html="";

snapshot.forEach((docu)=>{

let j = docu.data();

html += `
<div class="player">
<span>${j.nome} - ${j.pos}</span>
<span>⭐${j.nota}</span>
</div>
`;

});

lista.innerHTML = html;

});

// login adm
window.loginADM = function(){

let senha = prompt("Senha ADM:");

if(senha=="1234"){
document.getElementById("painelADM").style.display="block";
}else{
alert("Senha errada");
}

}

// editar estrelas
window.editarNota = async function(){

let nome = document.getElementById("nomeADM").value.trim();
let nota = Number(document.getElementById("notaADM").value);

const snap = await getDocs(collection(db,"jogadores"));

snap.forEach(async(item)=>{

let dados = item.data();

if(dados.nome.toLowerCase()==nome.toLowerCase()){

await updateDoc(doc(db,"jogadores",item.id),{
nota:nota
});

}

});

alert("Atualizado!");

}

// limpar lista
window.limpar = async function(){

if(!confirm("Apagar tudo?")) return;

const snap = await getDocs(collection(db,"jogadores"));

snap.forEach(async(item)=>{
await deleteDoc(doc(db,"jogadores",item.id));
});

}

</script>

</body>
</html>
