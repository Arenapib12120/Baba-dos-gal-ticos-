<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena PIB</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:#fff;
    text-align:center;
}
header{
    background:#f1c40f;
    color:#000;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}
.box{
    margin:20px auto;
    padding:20px;
    max-width:500px;
    background:#1e1e1e;
    border-radius:12px;
}
input,select,button{
    width:90%;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:8px;
}
button{
    background:#f1c40f;
    font-weight:bold;
}
.player{
    background:#333;
    margin:5px;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>⚽ ARENA PIB</header>

<div class="box">
<h2>Contagem para o Baba</h2>
<div id="countdown">Carregando...</div>
</div>

<div class="box">
<h2>Adicionar Jogador</h2>

<input type="text" id="nome" placeholder="Nome">

<select id="posicao">
<option>Atacante</option>
<option>Meio</option>
<option>Zagueiro</option>
<option>Goleiro</option>
</select>

<select id="estrela">
<option value="1">⭐ 1</option>
<option value="2">⭐⭐ 2</option>
<option value="3">⭐⭐⭐ 3</option>
<option value="4">⭐⭐⭐⭐ 4</option>
<option value="5">⭐⭐⭐⭐⭐ 5</option>
</select>

<button onclick="addPlayerFirebase()">Adicionar</button>
</div>

<div class="box">
<h2>Jogadores</h2>
<div id="lista"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBJmCBbOCIyIBc_H75wmBI9O_iIkiU_9E",
authDomain: "galaticos-2283d.firebaseapp.com",
databaseURL:"https://galaticos-2283d-default-rtdb.firebaseio.com",
projectId: "galaticos-2283d",
storageBucket: "galaticos-2283d.appspot.com",
messagingSenderId: "485226353231",
appId: "1:485226353231:web:b8cde1da83acc27aa9f83a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const playersRef = ref(db,"jogadores");

// CONTAGEM
function countdown(){
let now = new Date();
let target = new Date();

let day = now.getDay();
let faltam = (1 - day + 7) % 7;

target.setDate(now.getDate()+faltam);
target.setHours(20,0,0,0);

if(now > target){
target.setDate(target.getDate()+7);
}

let diff = target - now;

let d = Math.floor(diff/86400000);
let h = Math.floor(diff%86400000/3600000);
let m = Math.floor(diff%3600000/60000);
let s = Math.floor(diff%60000/1000);

document.getElementById("countdown").innerHTML =
`${d}d ${h}h ${m}m ${s}s`;
}

setInterval(countdown,1000);
countdown();

// ADICIONAR
window.addPlayerFirebase = function(){

let nome = document.getElementById("nome").value;
let posicao = document.getElementById("posicao").value;
let quality = document.getElementById("estrela").value;

if(nome=="") return alert("Digite nome");

push(playersRef,{
nome,
position:posicao,
quality:Number(quality)
});

document.getElementById("nome").value="";
}

// LISTAR
onValue(playersRef,(snapshot)=>{

let data = snapshot.val();
let html = "";

for(let id in data){

let p = data[id];

html += `
<div class="player">
${p.nome} - ${p.position} - ⭐${p.quality}
</div>
`;
}

document.getElementById("lista").innerHTML = html;

});

</script>

</body>
</html>
