<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Baba dos Galáticos</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(90deg,#f1c40f,#ffd700);
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#000;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

h2{
color:#f1c40f;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

input,select{
background:#1f2937;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.player,.linha{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-top:8px;
}

.player{
display:flex;
justify-content:space-between;
}

.team{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.gol{
background:#f39c12;
color:#000;
font-weight:bold;
}

.campeao{
text-align:center;
background:#1f2937;
padding:20px;
border-radius:15px;
margin-top:15px;
}

.campeao img{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
border:4px solid gold;
box-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<header>⚽ BABA DOS GALÁTICOS</header>

<div class="container">

<div class="card">
<h2>➕ Adicionar Jogador</h2>

<input type="text" id="nome" placeholder="Nome">

<select id="posicao">
<option>Goleiro</option>
<option>Linha</option>
</select>

<select id="nota">
<option value="1">⭐1</option>
<option value="2">⭐2</option>
<option value="3">⭐3</option>
<option value="4">⭐4</option>
<option value="5">⭐5</option>
</select>

<button onclick="addPlayer()">Salvar</button>
</div>

<div class="card">
<h2>📋 Jogadores</h2>
<div id="lista"></div>
</div>

<div class="card">
<h2>⚽ Sortear Times</h2>

<select id="times">
<option value="2">2 Times</option>
<option value="3">3 Times</option>
<option value="4">4 Times</option>
</select>

<button onclick="sortear()">Sortear Agora</button>

<div id="resultado"></div>
</div>

<div class="card">
<h2>🏆 Campeão Atual</h2>

<input type="text" id="nomeCampeao" placeholder="Nome do campeão">

<input type="file" id="fotoCampeao" accept="image/*">

<button onclick="salvarCampeao()">Salvar Campeão</button>

<div id="campeaoBox"></div>
</div>

</div>

<script>

let jogadores = JSON.parse(localStorage.getItem("galaticos")) || [];

function salvar(){
localStorage.setItem("galaticos",JSON.stringify(jogadores));
render();
}

function addPlayer(){

let nome = document.getElementById("nome").value;
let pos = document.getElementById("posicao").value;
let nota = Number(document.getElementById("nota").value);

if(nome=="") return alert("Digite nome");

jogadores.push({nome,pos,nota});

document.getElementById("nome").value="";
salvar();
}

function render(){

let html="";

jogadores.forEach(j=>{

html += `
<div class="player">
<span>${j.nome} - ${j.pos}</span>
<span>⭐${j.nota}</span>
</div>
`;

});

document.getElementById("lista").innerHTML = html;
}

render();


// ================= SORTERIO FUTSAL =================
function sortear(){

let qtd = Number(document.getElementById("times").value);

let goleiros = jogadores.filter(j=>j.pos=="Goleiro").sort((a,b)=>b.nota-a.nota);
let linha = jogadores.filter(j=>j.pos=="Linha").sort((a,b)=>b.nota-a.nota);

let times = [];

for(let i=0;i<qtd;i++){
times.push({
nome:"Galáticos "+String.fromCharCode(65+i),
goleiro:null,
linha:[],
total:0
});
}

goleiros.forEach((g,i)=>{
if(i<qtd){
times[i].goleiro = g;
times[i].total += g.nota;
}
});

linha.forEach(p=>{

times.sort((a,b)=>a.total-b.total);

let destino = times.find(t=>t.linha.length < 4);

if(destino){
destino.linha.push(p);
destino.total += p.nota;
}

});

let html="";

times.forEach(t=>{

html += `
<div class="team">
<h3>${t.nome} (${t.total}⭐)</h3>

<div class="linha gol">
🥅 ${t.goleiro ? t.goleiro.nome+" ⭐"+t.goleiro.nota : "Sem goleiro"}
</div>
`;

t.linha.forEach((j,index)=>{
html += `<div class="linha">👟 Linha ${index+1}: ${j.nome} ⭐${j.nota}</div>`;
});

html += `</div>`;

});

document.getElementById("resultado").innerHTML = html;

}


// ================= CAMPEÃO =================
window.onload = function(){
mostrarCampeao();
}

function salvarCampeao(){

let nome = document.getElementById("nomeCampeao").value;
let file = document.getElementById("fotoCampeao").files[0];

if(!nome || !file){
alert("Digite nome e escolha foto");
return;
}

let reader = new FileReader();

reader.onload = function(e){

localStorage.setItem("campeaoGalaticos", JSON.stringify({
nome:nome,
foto:e.target.result
}));

mostrarCampeao();

}

reader.readAsDataURL(file);
}

function mostrarCampeao(){

let data = JSON.parse(localStorage.getItem("campeaoGalaticos"));

if(!data) return;

document.getElementById("campeaoBox").innerHTML = `
<div class="campeao">

<img src="${data.foto}">

<h2 style="color:gold;margin-top:15px;">
🏆 ${data.nome}
</h2>

<p>Campeão Atual</p>

</div>
`;
}

</script>

</body>
</html>
